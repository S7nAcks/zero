---
# -------------------------------------------------------
# ckpool + ckdb + PostgreSQL
# External bitcoind assumed (configure via env / conf)
# -------------------------------------------------------

services:

  # ── PostgreSQL ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ckdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: postgres
      # passed through to the init script
      CKDB_USER: ${CKDB_USER:-ckdb}
      CKDB_PASS: ${CKDB_PASS:-CHANGE_ME}
      CKDB_NAME: ${CKDB_NAME:-ckdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-ckdb.sh:/docker-entrypoint-initdb.d/init-ckdb.sh:ro
    ports:
      - "127.0.0.1:5432:5432"   # bind localhost only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ckpool + ckdb ────────────────────────────────────
  ckpool:
    build:
      context: ./ckpool
      dockerfile: Dockerfile
      args:
        REPO_URL: https://bitbucket.org/ckolivas/ckpool
        BRANCH: master
    image: ckpool-ckdb:latest
    container_name: ckpool
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ckdb socket / log dirs (must match ckdb.conf)
      CKDB_SOCKDIR: /zero/ckpool/run/ckdb
      CKPOOL_SOCKDIR: /zero/ckpool/run/ckpool
      CKPOOL_LOGDIR: /zero/ckpool/log
      CKDB_LOGDIR: /zero/ckpool/log
      CKPOOL_CONF: /zero/ckpool/conf/ckpool.conf
      CKDB_CONF: /zero/ckpool/conf/ckdb.conf
      # PostgreSQL connection (used by entrypoint wait-check)
      PGHOST: db
      PGPORT: 5432
    volumes:
      - ./conf/ckpool.conf:/zero/ckpool/conf/ckpool.conf:ro
      - ./conf/ckdb.conf:/zero/ckpool/conf/ckdb.conf:ro
      - ckpool-logs:/zero/ckpool/log
    ports:
      - "3333:3333"   # Stratum
      - "4028:4028"   # ckpool management API
    extra_hosts:
      # Allows reaching the Docker host (where bitcoind lives)
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  ckpool-logs:
