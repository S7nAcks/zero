{
  "btcd" : [
    {
      "url"  : "BITCOIND_HOST:BITCOIND_RPCPORT",
      "auth" : "BITCOIND_RPCUSER",
      "pass" : "BITCOIND_RPCPASS"
    }
  ],
  "btcaddress"    : "YOUR_BITCOIN_ADDRESS",
  "btcsig"        : "/mined by your pool/",
